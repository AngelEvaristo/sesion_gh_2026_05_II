name: Workflow deploy dev - Node

on:
  workflow_dispatch: {}

env:
  VERSIONNODE: 20

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CONFIGURATION: production
    steps:
      - name: Checout repo
        uses: actions/checkout@v4

      - name: Setear version Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.VERSIONNODE }}

      - name: Restore    
        run: |
          echo "Restaurar paquetes"
          npm install -g @angular/cli
          npm install

      - name: build
        run: ng build --configuration $CONFIGURATION
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: test
        run: echo "Pruebas env y vars"         
